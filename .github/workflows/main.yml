name: python-deployment

run-name: ${{ github.actor }} - ${{ github.ref_name}} -${{ github.sha }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      artifact_choice:
        description: 'Choose artifact from matrix to deploy'
        required: true
        default: 'ubuntu-latest-3.8'
        type: choice
        options:
          - ubuntu-latest-3.8
          - ubuntu-latest-3.9
          - windows-latest-3.8
          - windows-latest-3.9

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PythonVersion: 3.8
  DockerImageName: todoapp

jobs:
  python-ci:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.9"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage flake8
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python manage.py test

      - name: Generate Report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        run: |
          coverage run --source='.' manage.py test
          coverage report

      - name: Linting
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        run: |
          flake8 . --show-source --statistics --exit-zero

      - name: Check Complexity
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        run: |
          flake8 . --exit-zero --max-complexity=6

      - name: Upload python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts-${{ matrix.os }}-${{ matrix.python-version }}
          path: .
          overwrite: true

      - name: Upload helm artifacts
        # Строго ограничиваем, чтобы только ОДНА итерация матрицы загружала этот артефакт
        if: github.ref_name == 'main' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        uses: actions/upload-artifact@v4
        with:
          name: helm-artifacts
          path: ${{ github.workspace }}/helm-charts
          overwrite: true

      - name: Upload kind cluster artifact
        # Строго ограничиваем, чтобы только ОДНА итерация матрицы загружала этот артефакт
        if: github.ref_name == 'main' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.8'
        uses: actions/upload-artifact@v4
        with:
          name: kind-cluster
          path: ${{ github.workspace }}/cluster.yml
          overwrite: true

  docker-ci:
    name: Build and Push Image
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    needs: python-ci
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      name: Download python artifacts
      with:
        name: python-artifacts-ubuntu-latest-3.8
        path: .

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        push: true
        context: ./src
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }}:${{ github.sha }}

  helm-ci:
    runs-on: ubuntu-latest
    needs: python-ci
    if: github.ref_name == 'main'
    name: Helm CI
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: helm-artifacts
        path: .

    - name: Set Up Helm
      uses: azure/setup-helm@v4.2.0

    - name: Lint helm
      run: helm lint ./todoapp/

    - name: Template Helm
      run: helm template todoapp ./todoapp/ -f ./todoapp/values.yaml

    - name: Package Helm
      run: helm package ./todoapp

    - name: Upload Helm Artifact
      uses: actions/upload-artifact@v4
      with:
        name: helm-package
        path: ./*.tgz
        overwrite: true

  deploy-helm-dev:
    name: Deploy helm to Development
    uses: ./.github/workflows/reusable-deployment.yml
    needs: [helm-ci, docker-ci]
    secrets: inherit
    with:
      environment: development
      version: ${{ github.sha }}

  deploy-helm-stg:
    name: Deploy helm to Staging
    uses: ./.github/workflows/reusable-deployment.yml
    needs: [deploy-helm-dev]
    secrets: inherit
    with:
      environment: staging
      version: ${{ github.sha }}
      helm-values-path: ./todoapp/values/stg.yaml
      helm-release-name: todoapp-staging

