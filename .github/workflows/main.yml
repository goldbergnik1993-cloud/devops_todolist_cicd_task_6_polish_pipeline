name: python-deployment

run-name: ${{ github.actor }} - ${{ github.ref_name}} - ${{ github.sha }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: 
    inputs:
      artifact_choice:
        description: 'Choose artifact to deploy'
        required: true
        default: 'ubuntu-latest-3.9'
        type: choice
        options:
          - ubuntu-latest-3.8
          - ubuntu-latest-3.9
          - windows-latest-3.8
          - windows-latest-3.9


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DockerImageName: ${{ secrets.DOCKERHUB_USERNAME }} 
jobs:
  python-ci:
    name: Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.9"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage flake8 -r requirements.txt

      - name: Run tests
        run: python manage.py test

      - name: Generate Report (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          coverage run --source='.' manage.py test
          coverage report

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./src

  docker-ci:
    name: Build and Push Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: python-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }}:${{ github.sha }}

  deploy-helm-dev:
    name: Deploy to Development
    uses: ./.github/workflows/reusable-deployment.yml
    needs: [docker-ci]
    secrets: inherit
    with:
      environment: development
      version: ${{ github.sha }}

  deploy-helm-stg:
    name: Deploy to Staging
    uses: ./.github/workflows/reusable-deployment.yml
    needs: [deploy-helm-dev]
    secrets: inherit
    with:
      environment: staging # Настройте 'Required reviewers' в Settings -> Environments -> staging
      version: ${{ github.sha }}
      helm-values-path: ./todoapp/values/stg.yaml
      helm-release-name: todoapp-staging
